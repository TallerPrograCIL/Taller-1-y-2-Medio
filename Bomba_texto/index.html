<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bomba</title>
</head>
<body>

<h1 id="mensaje">💣 Esperando...</h1>

<script>
let tiempo = Number(prompt("Activa la bomba (segundos):"));
let mensaje = document.getElementById("mensaje");

let intervalo = setInterval(function() {
    mensaje.textContent = "Explota en: " + tiempo;
    tiempo--;

    if (tiempo < 0) {
        clearInterval(intervalo);
        mensaje.textContent = "💥 BOOM 💥";
    }
}, 1000);
</script>

</body>
</html>
